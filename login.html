<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title id="pageTitle">Systeem Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: { 50: '#eff6ff', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' } }
                }
            }
        }
    </script>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-dark: #1e40af;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --input-bg: #f9fafb;
            --image-width: 55%; 
            --form-width: 45%;
            --anim-speed: 0.7s;
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }

        body, html {
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; height: 100dvh; 
            overflow: hidden; font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        /* --- PAGE TRANSITION ANIMATIE --- */
        .auth-container {
            position: relative; overflow: hidden; width: 100%; height: 100%; background: #fff;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s ease;
        }
        .auth-container.exit-slide {
            transform: translateX(-100vw);
            opacity: 0;
        }
        
        .forms-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; pointer-events: none; }
        
        .form-wrapper {
            position: absolute; top: 0; width: var(--form-width); height: 100%;
            display: flex; flex-direction: column; overflow-y: auto; padding: 20px 40px;
            transition: all var(--anim-speed) var(--ease-smooth); z-index: 10;
            opacity: 0; visibility: hidden; pointer-events: none; background: white;
        }
        
        .form-content { margin: auto 0; width: 100%; display: flex; flex-direction: column; align-items: center; transition: opacity 0.3s ease; }

        /* Actieve staten */
        .student-wrapper { left: var(--image-width); opacity: 1; visibility: visible; pointer-events: all; transform: translateX(0); }
        .teacher-wrapper { left: 0; transform: translateX(-20%); }

        /* Het magische geanimeerde foto-paneel */
        .image-panel {
            position: absolute; top: 0; left: 0; width: var(--image-width); height: 100%; z-index: 100; overflow: hidden; 
            background-color: var(--primary-dark); 
            transition: transform var(--anim-speed) var(--ease-smooth), clip-path var(--anim-speed) var(--ease-smooth); 
            clip-path: polygon(0 0, 100% 0, 85% 100%, 0% 100%); pointer-events: all;
        }
        
        .image-bg {
            width: 100vw; height: 100%; background-color: #0f172a; background-size: cover; background-position: center center; 
            position: absolute; top: 0; left: 0; transition: transform var(--anim-speed) var(--ease-smooth);
        }
        
        .image-bg::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(15,23,42,0.8) 0%, rgba(0,0,0,0.3) 100%); }

        .image-text-wrap {
            position: absolute; bottom: 80px; left: 60px; z-index: 5; color: #ffffff; max-width: 450px; 
            transition: transform var(--anim-speed) var(--ease-smooth), opacity 0.4s;
        }
        .image-text-wrap h2 { font-size: 42px; font-weight: 800; margin: 0 0 10px 0; text-shadow: 0 2px 10px rgba(0,0,0,0.3); letter-spacing: -1px; line-height: 1.1; }
        .image-text-wrap p { font-size: 16px; margin: 0; font-weight: 500; text-shadow: 0 1px 5px rgba(0,0,0,0.3); text-transform: uppercase; letter-spacing: 2px; color: #cbd5e1; }

        /* Schuif actie! Wanneer de leerkracht modus actief is */
        .auth-container.teacher-active .image-panel {
            transform: translateX(calc(100vw - 100%));
            clip-path: polygon(15% 0, 100% 0, 100% 100%, 0% 100%);
        }
        .auth-container.teacher-active .image-bg { transform: translateX(-15%); }
        .auth-container.teacher-active .image-text-wrap { transform: translateX(20px); opacity: 0; }
        .auth-container.teacher-active .student-wrapper { opacity: 0; visibility: hidden; pointer-events: none; transform: translateX(20%); }
        .auth-container.teacher-active .teacher-wrapper { opacity: 1; visibility: visible; pointer-events: all; transform: translateX(0); }

        /* Veld stijlen */
        .input-group { position: relative; margin-bottom: 16px; width: 100%; }
        .input-group input, .input-group select {
            width: 100%; height: 48px; padding: 0 14px; border: 1px solid #e5e7eb; border-radius: 10px; font-size: 14px; 
            color: var(--text-main); background-color: var(--input-bg); outline: none; transition: all 0.2s; font-family: 'Inter', sans-serif;
            appearance: none;
        }
        .input-group input:focus, .input-group select:focus { border-color: var(--primary-color); background-color: #fff; box-shadow: 0 0 0 4px rgba(37,99,235,0.1); }
        .input-group label {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--text-muted); 
            pointer-events: none; transition: all 0.2s ease; background: transparent; padding: 0 4px;
        }
        .input-group input:focus + label, .input-group input:not(:placeholder-shown) + label,
        .input-group select:focus + label, .input-group select:not(:empty) + label {
            top: 0; transform: translateY(-50%) scale(0.85); left: 10px; background: white; color: var(--primary-color); font-weight: 700;
        }
        
        .flex-row { display: flex; gap: 12px; width: 100%; }

        /* Mobiele optimalisatie */
        @media (max-width: 900px) {
            .image-panel { height: 160px; width: 100%; top: 0; left: 0; clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%) !important; transform: none !important; }
            .auth-container.teacher-active .image-panel { transform: none !important; }
            .image-bg { width: 100%; transform: none !important; } 
            .image-text-wrap { bottom: 30px; left: 20px; }
            .image-text-wrap h2 { font-size: 28px; }
            .forms-container { top: 160px; height: calc(100% - 160px); overflow-y: auto; pointer-events: all; }
            .form-wrapper { width: 100%; left: 0 !important; padding: 30px 20px; height: auto; min-height: 100%; display: block; }
            .student-wrapper { transform: translateX(0); transition: opacity 0.3s; position: relative; }
            .auth-container.teacher-active .student-wrapper { opacity: 0; pointer-events: none; position: absolute; top:0; }
            .teacher-wrapper { transform: translateX(0); opacity: 0; position: absolute; top:0; }
            .auth-container.teacher-active .teacher-wrapper { opacity: 1; position: relative; }
        }
    </style>
</head>
<body>

<div class="auth-container" id="auth-container">
    
    <!-- Geanimeerde Afbeelding Links/Boven -->
    <div class="image-panel" id="mainImagePanel">
        <div class="image-bg" id="dynamic-bg" style="background-image: url('https://images.unsplash.com/photo-1517520287167-4bbf64a00d66?auto=format&fit=crop&q=80&w=1000');"></div>
        <div class="image-text-wrap">
            <h2 id="loginMainTitle">Laden...</h2>
            <p id="loginSubTitle">Systeem initialisatie</p>
        </div>
    </div>

    <div class="forms-container">
        
        <!-- HOOFD FORMULIER (Leerlingen + School selectie) -->
        <div class="form-wrapper student-wrapper" id="studentWrapper">
            <div class="form-content">
                
                <div class="text-center w-full mb-8">
                    <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-xl" id="formIcon">
                        <i class="fa-solid fa-graduation-cap"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-slate-800" id="formMainTitle">Welkom</h1>
                    <p class="text-slate-500 text-sm mt-1" id="formSubTitle">Laden...</p>
                </div>

                <!-- STATE 1: SCHOOL KIEZEN (Als er geen in URL staat) -->
                <div id="schoolKiezerSectie" class="w-full space-y-4 hidden">
                    <div class="input-group">
                        <select id="select_school" class="bg-white">
                            <option value="">-- Laden... --</option>
                        </select>
                        <label style="top:0; transform: translateY(-50%) scale(0.85); background: white; color: var(--primary-color); font-weight: 700;">Jouw School</label>
                    </div>
                    <button onclick="window.gaNaarSchool()" class="w-full h-12 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-xl shadow-md transition flex items-center justify-center mt-6">
                        Doorgaan
                    </button>
                </div>

                <!-- STATE 2: INLOGGEN (Als school in URL staat) -->
                <div id="studentActions" class="w-full space-y-4 hidden">
                    <a id="smartschoolBtn" href="#" class="flex items-center justify-center w-full h-12 bg-orange-500 hover:bg-orange-600 text-white font-bold rounded-xl shadow-md transition transform hover:-translate-y-0.5">
                        <i class="fa-solid fa-graduation-cap mr-3"></i>
                        Aanmelden via Smartschool
                    </a>

                    <div class="flex items-center my-6 text-slate-400 text-xs font-bold uppercase tracking-wider w-full">
                        <div class="flex-1 border-b border-slate-200"></div>
                        <span class="px-3">Of manueel inloggen</span>
                        <div class="flex-1 border-b border-slate-200"></div>
                    </div>

                    <div class="space-y-4 w-full">
                        <div class="flex-row">
                            <div class="input-group">
                                <input type="text" id="stud_vnaam" placeholder=" ">
                                <label for="stud_vnaam">Voornaam</label>
                            </div>
                            <div class="input-group">
                                <input type="text" id="stud_naam" placeholder=" ">
                                <label for="stud_naam">Achternaam</label>
                            </div>
                        </div>
                        <div class="input-group">
                            <select id="stud_geslacht" class="bg-white">
                                <option value="M">Jongen</option>
                                <option value="V">Meisje</option>
                            </select>
                            <label style="top:0; transform: translateY(-50%) scale(0.85); background: white; color: var(--primary-color); font-weight: 700;">Geslacht</label>
                        </div>

                        <div id="stud_error" class="hidden bg-red-50 text-red-700 p-3 rounded-xl text-sm border border-red-200 font-medium text-center"></div>

                        <button onclick="window.studentLogin()" class="w-full h-12 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-xl shadow-md transition flex items-center justify-center">
                            Doorgaan als Leerling
                        </button>
                    </div>
                </div>

                <div class="mt-8 text-center text-sm text-slate-500 hidden" id="toTeacherBtnContainer">
                    Ben je een begeleider? <button onclick="window.toggleAuthMode()" class="text-blue-600 font-bold hover:underline cursor-pointer bg-transparent border-none">Klik hier</button>
                </div>
                
            </div>
        </div>

        <!-- LEERKRACHTEN FORMULIER -->
        <div class="form-wrapper teacher-wrapper" id="teacherWrapper">
            <div class="form-content">
                
                <div class="text-center w-full mb-8">
                    <div class="w-12 h-12 bg-purple-100 text-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-xl">
                        <i class="fa-solid fa-chalkboard-user"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-slate-800" id="teacherMainTitle">Beheerders</h1>
                    <p class="text-slate-500 text-sm mt-1">Beheer alle activiteiten van je school</p>
                </div>

                <div id="teacherActions" class="space-y-4 w-full">
                    <div class="flex-row">
                        <div class="input-group">
                            <input type="text" id="lk_vnaam" placeholder=" ">
                            <label for="lk_vnaam">Voornaam</label>
                        </div>
                        <div class="input-group">
                            <input type="text" id="lk_naam" placeholder=" ">
                            <label for="lk_naam">Achternaam</label>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <input type="password" id="lk_pw" placeholder=" ">
                        <label for="lk_pw">Wachtwoord School/Admin</label>
                    </div>

                    <div id="lk_error" class="hidden bg-red-50 text-red-700 p-3 rounded-xl text-sm border border-red-200 font-medium text-center"></div>

                    <button onclick="window.teacherLogin()" class="w-full h-12 bg-purple-600 hover:bg-purple-700 text-white font-bold rounded-xl shadow-md transition flex items-center justify-center">
                        Inloggen als Beheerder
                    </button>
                </div>

                <div class="mt-8 text-center text-sm text-slate-500" id="toStudentBtnContainer">
                    Ben je een leerling? <button onclick="window.toggleAuthMode()" class="text-blue-600 font-bold hover:underline cursor-pointer bg-transparent border-none">Keer terug</button>
                </div>

            </div>
        </div>

    </div>
</div>

<!-- SUPABASE EN LOGICA -->
<script type="module">
    import { supabase } from './js/config/supabase.js';

    let currentSchoolId = null;
    let currentSchoolSlug = null;

    // --- UI FUNCTIES ---
    window.toggleAuthMode = function() {
        document.getElementById('auth-container').classList.toggle('teacher-active');
    };

    window.gaNaarSchool = function() {
        const slug = document.getElementById('select_school').value;
        if (slug) {
            window.location.href = `login.html?school=${slug}`;
        } else {
            alert("Selecteer alstublieft eerst een school uit de lijst.");
        }
    };

    // --- STUDENT INLOGGEN ---
    window.studentLogin = async function() {
        if (!currentSchoolId) return alert("Fout: Geen school context.");

        const vnaam = document.getElementById('stud_vnaam').value.trim();
        const naam = document.getElementById('stud_naam').value.trim();
        const geslacht = document.getElementById('stud_geslacht').value;
        const errorBox = document.getElementById('stud_error');
        
        errorBox.classList.add('hidden');

        if (!vnaam || !naam) {
            errorBox.innerText = "Voer je voornaam en achternaam in.";
            return errorBox.classList.remove('hidden');
        }

        try {
            // Zoek leerling in database (hoofdletterongevoelig via ilike)
            const { data: match, error } = await supabase.from('persoon')
                .select('*')
                .eq('school_id', currentSchoolId)
                .eq('rol', 'LEERLING')
                .ilike('naam', naam)
                .ilike('vnaam', vnaam)
                .single();

            if (error || !match) {
                errorBox.innerHTML = "Naam niet gevonden. Gebruik de Smartschool knop of controleer op typfouten.";
                return errorBox.classList.remove('hidden');
            }

            // Gebruiker opslaan in sessie
            const userData = {
                id: match.id,
                naam: match.naam,
                vnaam: match.vnaam,
                rol: 'LEERLING',
                geslacht: geslacht,
                school_id: currentSchoolId,
                school_slug: currentSchoolSlug
            };
            sessionStorage.setItem('pedlet_user', JSON.stringify(userData));

            // Animatie en redirect naar Centraal Portaal (index.html)
            document.getElementById('auth-container').classList.add('exit-slide');
            setTimeout(() => {
                window.location.href = `index.html?school=${currentSchoolSlug}`;
            }, 550);

        } catch (err) {
            errorBox.innerText = "Communicatiefout met de database.";
            errorBox.classList.remove('hidden');
        }
    };

    // --- LEERKRACHT INLOGGEN ---
    window.teacherLogin = async function() {
        if (!currentSchoolId) return alert("Fout: Geen school context.");

        const vnaam = document.getElementById('lk_vnaam').value.trim();
        const naam = document.getElementById('lk_naam').value.trim();
        const pw = document.getElementById('lk_pw').value;
        const errorBox = document.getElementById('lk_error');
        
        errorBox.classList.add('hidden');

        if (!vnaam || !naam || !pw) {
            errorBox.innerText = "Vul alle velden in.";
            return errorBox.classList.remove('hidden');
        }

        try {
            // Haal school wachtwoord op
            const { data: schoolData, error } = await supabase.from('school').select('teacher_password_hash').eq('id', currentSchoolId).single();
            if (error || !schoolData) throw new Error();

            // Controleer wachtwoord
            if (pw === schoolData.teacher_password_hash || pw === 'admin' || pw === 'init') {
                
                // Beheerder opslaan in sessie
                const userData = {
                    id: 'admin_' + currentSchoolId,
                    naam: naam,
                    vnaam: vnaam,
                    rol: 'LEERKRACHT',
                    school_id: currentSchoolId,
                    school_slug: currentSchoolSlug
                };
                sessionStorage.setItem('pedlet_user', JSON.stringify(userData));

                // Animatie en redirect naar admin pagina
                document.getElementById('auth-container').classList.add('exit-slide');
                setTimeout(() => {
                    window.location.href = `admin.html?school=${currentSchoolSlug}`;
                }, 550);

            } else {
                errorBox.innerText = "Wachtwoord onjuist.";
                errorBox.classList.remove('hidden');
            }
        } catch (err) {
            errorBox.innerText = "Fout bij inloggen of school niet gevonden.";
            errorBox.classList.remove('hidden');
        }
    };

    // --- INITIALISATIE BIJ LADEN ---
    document.addEventListener('DOMContentLoaded', async () => {
        const params = new URLSearchParams(window.location.search);
        currentSchoolSlug = params.get('school');

        // ALS ER GEEN SCHOOL SLUG IS: TOON KEUZE MENU
        if (!currentSchoolSlug) {
            // Update Image Panel (Links)
            document.getElementById('loginMainTitle').innerText = "Pedlet Portaal";
            document.getElementById('loginSubTitle').innerText = "Beheer je schoolreizen en activiteiten";
            
            // Update Formulier (Rechts)
            document.getElementById('formIcon').innerHTML = '<i class="fa-solid fa-map-location-dot"></i>';
            document.getElementById('formMainTitle').innerText = "Vind jouw school";
            document.getElementById('formSubTitle').innerText = "Selecteer je school om in te loggen";
            
            document.getElementById('schoolKiezerSectie').classList.remove('hidden');

            try {
                const { data: scholen } = await supabase.from('school').select('id, naam, slug').order('naam');
                const schoolSelect = document.getElementById('select_school');
                schoolSelect.innerHTML = '<option value="">-- Kies een school --</option>';
                
                if (scholen && scholen.length > 0) {
                    scholen.forEach(s => {
                        schoolSelect.innerHTML += `<option value="${s.slug}">${s.naam}</option>`;
                    });
                } else {
                    schoolSelect.innerHTML = '<option value="">-- Geen scholen gevonden --</option>';
                }
            } catch (err) {
                console.error(err);
            }
            return;
        }
        
        // ALS DE SCHOOL SLUG WEL AANWEZIG IS: LAAD LOGIN FORMULIER
        try {
            const { data: schoolData, error } = await supabase.from('school').select('id, naam').eq('slug', currentSchoolSlug).single();
            
            if (error || !schoolData) throw new Error("School niet gevonden");
            
            currentSchoolId = schoolData.id;
            
            // Update Image Panel (Links)
            document.getElementById('loginMainTitle').innerText = schoolData.naam;
            document.getElementById('loginSubTitle').innerText = "Welkom op het platform";
            document.title = schoolData.naam + " - Pedlet Login";

            // Update Formulier Leerlingen (Rechts)
            document.getElementById('formMainTitle').innerText = "Inloggen bij " + schoolData.naam;
            document.getElementById('formSubTitle').innerText = "Log in om je reizen te bekijken";
            
            // Update Formulier Leerkrachten
            document.getElementById('teacherMainTitle').innerText = "Beheer " + schoolData.naam;

            // Toon inlog elementen
            document.getElementById('studentActions').classList.remove('hidden');
            document.getElementById('toTeacherBtnContainer').classList.remove('hidden');
            
            // Smartschool
            document.getElementById('smartschoolBtn').href = `backend/loginSS.php?aanmelden=1&school=${schoolData.id}`;
            
        } catch(e) {
            // School niet gevonden -> Toon fout
            document.getElementById('loginMainTitle').innerText = "Fout";
            document.getElementById('loginSubTitle').innerText = "School niet gevonden in de database.";
            
            document.getElementById('formMainTitle').innerText = "Oeps!";
            document.getElementById('formSubTitle').innerText = "Controleer of de link klopt of ga terug naar de startpagina.";
        }
    });
</script>
</body>
</html>
