<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Inloggen | Pedlet</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts & FontAwesome voor de specifieke look van het schuifsysteem -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Lucide Icons (voor compatibiliteit met rest van project) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: { 50: '#eff6ff', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' } }
                }
            }
        }
    </script>
    
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-dark: #1e40af;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --input-bg: #f9fafb;
            --image-width: 55%; 
            --form-width: 45%;
            --anim-speed: 0.7s;
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }

        body, html {
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; height: 100dvh; 
            overflow: hidden; font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        /* --- PAGE TRANSITION ANIMATIE --- */
        .auth-container {
            position: relative; overflow: hidden; width: 100%; height: 100%; background: #fff;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s ease;
        }
        .auth-container.exit-slide {
            transform: translateX(-100vw);
            opacity: 0;
        }
        
        .forms-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; pointer-events: none; }
        
        .form-wrapper {
            position: absolute; top: 0; width: var(--form-width); height: 100%;
            display: flex; flex-direction: column; overflow-y: auto; padding: 20px 40px;
            transition: all var(--anim-speed) var(--ease-smooth); z-index: 10;
            opacity: 0; visibility: hidden; pointer-events: none; background: white;
        }
        
        .form-content { margin: auto 0; width: 100%; display: flex; flex-direction: column; align-items: center; transition: opacity 0.3s ease; }

        /* Actieve staten */
        .student-wrapper { left: var(--image-width); opacity: 1; visibility: visible; pointer-events: all; transform: translateX(0); }
        .teacher-wrapper { left: 0; transform: translateX(-20%); }

        /* Het magische geanimeerde foto-paneel */
        .image-panel {
            position: absolute; top: 0; left: 0; width: var(--image-width); height: 100%; z-index: 100; overflow: hidden; 
            background-color: var(--primary-dark); 
            transition: transform var(--anim-speed) var(--ease-smooth), clip-path var(--anim-speed) var(--ease-smooth); 
            clip-path: polygon(0 0, 100% 0, 85% 100%, 0% 100%); pointer-events: all;
        }
        
        .image-bg {
            width: 100vw; height: 100%; background-color: #0f172a; background-size: cover; background-position: center center; 
            position: absolute; top: 0; left: 0; transition: transform var(--anim-speed) var(--ease-smooth);
        }
        
        .image-bg::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(15,23,42,0.8) 0%, rgba(0,0,0,0.3) 100%); }

        .image-text-wrap {
            position: absolute; bottom: 80px; left: 60px; z-index: 5; color: #ffffff; max-width: 450px; 
            transition: transform var(--anim-speed) var(--ease-smooth), opacity 0.4s;
        }
        .image-text-wrap h2 { font-size: 42px; font-weight: 800; margin: 0 0 10px 0; text-shadow: 0 2px 10px rgba(0,0,0,0.3); letter-spacing: -1px; line-height: 1.1; }
        .image-text-wrap p { font-size: 16px; margin: 0; font-weight: 500; text-shadow: 0 1px 5px rgba(0,0,0,0.3); text-transform: uppercase; letter-spacing: 2px; color: #cbd5e1; }

        /* Schuif actie! Wanneer de leerkracht modus actief is */
        .auth-container.teacher-active .image-panel {
            transform: translateX(calc(100vw - 100%));
            clip-path: polygon(15% 0, 100% 0, 100% 100%, 0% 100%);
        }
        .auth-container.teacher-active .image-bg { transform: translateX(-15%); }
        .auth-container.teacher-active .image-text-wrap { transform: translateX(20px); opacity: 0; }
        .auth-container.teacher-active .student-wrapper { opacity: 0; visibility: hidden; pointer-events: none; transform: translateX(20%); }
        .auth-container.teacher-active .teacher-wrapper { opacity: 1; visibility: visible; pointer-events: all; transform: translateX(0); }

        /* Veld stijlen */
        .input-group { position: relative; margin-bottom: 16px; width: 100%; }
        .input-group input, .input-group select {
            width: 100%; height: 48px; padding: 0 14px; border: 1px solid #e5e7eb; border-radius: 10px; font-size: 14px; 
            color: var(--text-main); background-color: var(--input-bg); outline: none; transition: all 0.2s; font-family: 'Inter', sans-serif;
        }
        .input-group input:focus, .input-group select:focus { border-color: var(--primary-color); background-color: #fff; box-shadow: 0 0 0 4px rgba(37,99,235,0.1); }
        .input-group label {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--text-muted); 
            pointer-events: none; transition: all 0.2s ease; background: transparent; padding: 0 4px;
        }
        .input-group input:focus + label, .input-group input:not(:placeholder-shown) + label {
            top: 0; transform: translateY(-50%) scale(0.85); left: 10px; background: white; color: var(--primary-color); font-weight: 700;
        }
        
        .flex-row { display: flex; gap: 12px; width: 100%; }

        /* Mobiele optimalisatie */
        @media (max-width: 900px) {
            .image-panel { height: 160px; width: 100%; top: 0; left: 0; clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%) !important; transform: none !important; }
            .auth-container.teacher-active .image-panel { transform: none !important; }
            .image-bg { width: 100%; transform: none !important; } 
            .image-text-wrap { bottom: 30px; left: 20px; }
            .image-text-wrap h2 { font-size: 28px; }
            .forms-container { top: 160px; height: calc(100% - 160px); overflow-y: auto; pointer-events: all; }
            .form-wrapper { width: 100%; left: 0 !important; padding: 30px 20px; height: auto; min-height: 100%; display: block; }
            .student-wrapper { transform: translateX(0); transition: opacity 0.3s; position: relative; }
            .auth-container.teacher-active .student-wrapper { opacity: 0; pointer-events: none; position: absolute; top:0; }
            .teacher-wrapper { transform: translateX(0); opacity: 0; position: absolute; top:0; }
            .auth-container.teacher-active .teacher-wrapper { opacity: 1; position: relative; }
        }
    </style>
</head>
<body>

<div class="auth-container" id="auth-container">
    
    <!-- Het bewegende beeldpaneel -->
    <div class="image-panel" id="mainImagePanel">
        <div class="image-bg" id="dynamic-bg"></div>
        <div class="image-text-wrap">
            <!-- Deze titels worden door loginUI.js ingevuld -->
            <h2 id="loginTitel">Laden...</h2>
            <p id="loginSubtitel">School ophalen</p>
        </div>
    </div>

    <div class="forms-container">
        
        <!-- ========================================== -->
        <!-- STUDENTEN PANEEL                           -->
        <!-- ========================================== -->
        <div class="form-wrapper student-wrapper" id="studentWrapper">
            <div class="form-content">
                
                <div class="text-center w-full mb-8">
                    <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-xl">
                        <i class="fa-solid fa-user-graduate"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-slate-800">Leerling Toegang</h1>
                    <p class="text-slate-500 text-sm mt-1">Kies een plaats of groep met je klasgenoten</p>
                </div>

                <!-- Hier komt de time-gate waarschuwing indien nodig -->
                <div id="tijdslotWaarschuwing" class="w-full"></div>

                <div id="studentActions" class="w-full space-y-4">
                    <!-- Smartschool Login Knop -->
                    <button id="btnSmartschoolLogin" class="flex items-center justify-center w-full h-12 bg-orange-500 hover:bg-orange-600 text-white font-bold rounded-xl shadow-md transition transform hover:-translate-y-0.5">
                        <i class="fa-solid fa-graduation-cap mr-3"></i>
                        Aanmelden via Smartschool
                    </button>

                    <div class="flex items-center my-6 text-slate-400 text-xs font-bold uppercase tracking-wider w-full">
                        <div class="flex-1 border-b border-slate-200"></div>
                        <span class="px-3">Of manueel inloggen</span>
                        <div class="flex-1 border-b border-slate-200"></div>
                    </div>

                    <!-- Manueel Formulier (Gekoppeld aan loginUI.js) -->
                    <form id="manueelLoginForm" class="space-y-4 w-full">
                        <div class="flex-row">
                            <div class="input-group">
                                <input type="text" id="inputVnaam" placeholder=" " required>
                                <label for="inputVnaam">Voornaam</label>
                            </div>
                            <div class="input-group">
                                <input type="text" id="inputNaam" placeholder=" " required>
                                <label for="inputNaam">Achternaam</label>
                            </div>
                        </div>
                        <div class="input-group">
                            <input type="text" id="inputKlas" placeholder=" " required>
                            <label for="inputKlas">Klas (bijv. 6WEC)</label>
                        </div>

                        <button type="submit" class="w-full h-12 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-xl shadow-md transition flex items-center justify-center">
                            Doorgaan als Leerling
                        </button>
                    </form>
                </div>

                <div class="mt-8 text-center text-sm text-slate-500">
                    Ben je een begeleider? <button type="button" onclick="toggleAuthMode()" class="text-blue-600 font-bold hover:underline cursor-pointer bg-transparent border-none">Klik hier</button>
                </div>
                
            </div>
        </div>

        <!-- ========================================== -->
        <!-- LEERKRACHTEN PANEEL                        -->
        <!-- ========================================== -->
        <div class="form-wrapper teacher-wrapper" id="teacherWrapper">
            <div class="form-content">
                
                <div class="text-center w-full mb-8">
                    <div class="w-12 h-12 bg-purple-100 text-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-xl">
                        <i class="fa-solid fa-chalkboard-user"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-slate-800">Beheerders</h1>
                    <p class="text-slate-500 text-sm mt-1">Beheer activiteiten en indelingen</p>
                </div>

                <form id="teacherLoginForm" class="space-y-4 w-full">
                    <div class="flex-row">
                        <div class="input-group">
                            <input type="text" id="inputLkrVnaam" placeholder=" " required>
                            <label for="inputLkrVnaam">Voornaam</label>
                        </div>
                        <div class="input-group">
                            <input type="text" id="inputLkrNaam" placeholder=" " required>
                            <label for="inputLkrNaam">Achternaam</label>
                        </div>
                    </div>

                    <div class="input-group">
                        <input type="password" id="inputLkrWachtwoord" placeholder=" " required>
                        <label for="inputLkrWachtwoord">Schoolwachtwoord</label>
                    </div>

                    <button type="submit" class="w-full h-12 bg-purple-600 hover:bg-purple-700 text-white font-bold rounded-xl shadow-md transition flex items-center justify-center">
                        Inloggen als Beheerder
                    </button>
                </form>

                <div class="mt-8 text-center text-sm text-slate-500">
                    Ben je een leerling? <button type="button" onclick="toggleAuthMode()" class="text-blue-600 font-bold hover:underline cursor-pointer bg-transparent border-none">Keer terug</button>
                </div>

            </div>
        </div>

    </div>
</div>

<!-- Scripts -->
<script>
    lucide.createIcons();
    
    // Functie voor de slide animatie
    function toggleAuthMode() {
        document.getElementById('auth-container').classList.toggle('teacher-active');
    }
</script>

<!-- Laad de Login UI Logica (Dit bestand passen we in de volgende stap aan!) -->
<script type="module" src="js/ui/loginUI.js"></script>

</body>
</html>
