<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inloggen | Pedlet</title>
    
    <!-- Tailwind CSS voor snelle, moderne styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            /* Fallback achtergrond, loginUI.js zal dit overschrijven als er een foto is ingesteld */
            background: linear-gradient(135deg, #e0e7ff 0%, #f3f4f6 100%);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Zorgt dat het formulier leesbaar is, zelfs met een drukke achtergrondfoto */
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body>

    <div class="max-w-md w-full mx-4">
        <!-- Het Inlog Formulier / Paneel -->
        <div class="glass-panel rounded-2xl shadow-2xl overflow-hidden border border-white/50 p-8">
            
            <!-- School / Activiteit Info -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center h-16 w-16 rounded-full bg-indigo-100 text-indigo-600 mb-4 shadow-inner">
                    <i data-lucide="school" class="h-8 w-8"></i>
                </div>
                <h1 id="loginTitel" class="text-3xl font-extrabold text-gray-900 mb-2">School laden...</h1>
                <p id="loginSubtitel" class="text-md text-gray-600 font-medium">Even geduld aub.</p>
            </div>

            <!-- Waarschuwingszone (Voor Time-Gates) -->
            <div id="tijdslotWaarschuwing"></div>

            <!-- Smartschool Inlogknop -->
            <button id="btnSmartschoolLogin" class="w-full flex items-center justify-center gap-3 px-4 py-3.5 bg-orange-500 hover:bg-orange-600 text-white font-bold rounded-xl shadow-md transition-all transform hover:-translate-y-0.5 mb-6">
                <i data-lucide="graduation-cap" class="w-6 h-6"></i>
                Inloggen met Smartschool
            </button>

            <!-- Visuele scheidingslijn -->
            <div class="relative flex items-center py-4" id="dividerManueel">
                <div class="flex-grow border-t border-gray-300"></div>
                <span class="flex-shrink-0 mx-4 text-gray-400 text-sm font-medium">of log manueel in</span>
                <div class="flex-grow border-t border-gray-300"></div>
            </div>

            <!-- Manueel Inlog Formulier (Alternatief) -->
            <form id="manueelLoginForm" class="space-y-4 mt-2">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="inputVnaam" class="block text-sm font-bold text-gray-700">Voornaam</label>
                        <input type="text" id="inputVnaam" class="mt-1 block w-full rounded-md border-gray-300 border p-2.5 shadow-sm focus:border-indigo-500 focus:ring-indigo-500" placeholder="bijv. Brent" required>
                    </div>
                    <div>
                        <label for="inputNaam" class="block text-sm font-bold text-gray-700">Achternaam</label>
                        <input type="text" id="inputNaam" class="mt-1 block w-full rounded-md border-gray-300 border p-2.5 shadow-sm focus:border-indigo-500 focus:ring-indigo-500" placeholder="bijv. Peeters" required>
                    </div>
                </div>
                <div>
                    <label for="inputKlas" class="block text-sm font-bold text-gray-700">Klas</label>
                    <input type="text" id="inputKlas" class="mt-1 block w-full rounded-md border-gray-300 border p-2.5 shadow-sm focus:border-indigo-500 focus:ring-indigo-500" placeholder="bijv. 6WEC" required>
                </div>
                <button type="submit" class="w-full flex items-center justify-center gap-2 py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors mt-2">
                    <i data-lucide="log-in" class="w-4 h-4"></i> Inloggen
                </button>
            </form>

        </div>
        
        <!-- Terug knop -->
        <div class="text-center mt-6">
            <a href="index.html" class="inline-flex items-center gap-2 text-sm font-medium text-gray-500 hover:text-gray-800 bg-white/50 px-4 py-2 rounded-full backdrop-blur transition-colors">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Terug naar hoofdmenu
            </a>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        // Start de iconen op
        lucide.createIcons();
    </script>
    
    <!-- Laad de Login UI Logica in -->
    <script type="module" src="js/ui/loginUI.js"></script>

</body>
</html>
